<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>flames</title>
  </head>
  <body>
    <div id="elm"></div>
    <script src="app.min.js"></script>
    <script>
      fetch("https://brandly.github.io/react-flame-graph/collapsed-perf.txt")
        .then(function(response) { return response.text(); })
        .then(function(data) {
          Elm.Main.init({
            node: document.getElementById('elm'),
            flags: data
          });
        });
    </script>
  </body>
</html>
